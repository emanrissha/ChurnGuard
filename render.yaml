services:
  - type: web
    name: churnguard-api
    runtime: python
    buildCommand: "pip install -r requirements.txt && pip install -e ."
    startCommand: "uvicorn api.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

  - type: web
    name: churnguard-dashboard
    runtime: python
    buildCommand: "pip install -r requirements.txt && pip install -e ."
    startCommand: "streamlit run dashboard/app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0